<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>EcoSphere — Log in</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#FBF5DE; --surface:#EAF3E1; --surface-warm:#FFF3DC; --surface-warm2:#FFF8E9;
    --border:#D9E4CB; --border-warm:#E8C878;
    --text:#20301D; --text-muted:#5C6B54; --text-faint:#8E9982;
    --env:#3C8A34; --env-strong:#0D530E; --soc:#2C7A87; --soc-strong:#1B5A62; --gov:#B23A6B;
    --gold:#D9A430; --gold-bright:#FFDF82; --gold-dim:#D9A4301C;
    --bloom:#F76FA6; --bloom-soft:#FBB4CE; --bloom-dim:#F76FA61C; --bloom-deep:#C6437F;
    --danger:#C2483A; --ink:#20301D;
  }
  *{box-sizing:border-box;}
  html,body{ margin:0; height:100%; }
  body{ background:var(--bg); color:var(--text); font-family:'Inter', sans-serif; font-size:14px; overflow:hidden; }
  .disp{ font-family:'Space Grotesk', sans-serif; font-weight:600; }
  .mono{ font-family:'IBM Plex Mono', monospace; }
  svg.crisp{ image-rendering:pixelated; shape-rendering:crispEdges; }
  :focus-visible{ outline:2px solid var(--env); outline-offset:2px; border-radius:4px; }
  @media (prefers-reduced-motion: reduce){
    *,*::before,*::after{ animation-duration:.001ms !important; animation-iteration-count:1 !important; transition-duration:.001ms !important; }
  }

  /* ================= SCENE ================= */
  .scene{ position:relative; width:100vw; height:100vh; overflow:hidden; display:flex; align-items:center; justify-content:center; }

  .sky{ position:absolute; inset:0; z-index:0;
    background: linear-gradient(to bottom,
      #211836 0%, #211836 12%,
      #382258 12%, #382258 25%,
      #5C3684 25%, #5C3684 39%,
      var(--gold) 39%, var(--gold) 53%,
      var(--gold-bright) 53%, var(--gold-bright) 69%,
      var(--surface-warm2) 69%, var(--surface-warm2) 100%);
    background-size:100% 230%; animation:skyDrift 26s ease-in-out infinite alternate; }
  @keyframes skyDrift{ from{ background-position:0 0; } to{ background-position:0 14%; } }

  .star{ position:absolute; background:#FFFDF3; border-radius:50%; animation:twinkle 3.2s ease-in-out infinite; }
  @keyframes twinkle{ 0%,100%{ opacity:.25; transform:scale(.8); } 50%{ opacity:1; transform:scale(1.15); } }

  .sun-wrap{ position:absolute; left:50%; top:16%; transform:translateX(-50%); z-index:1; animation:sunPulse 5s ease-in-out infinite; filter:drop-shadow(0 0 26px rgba(255,223,130,.55)); }
  @keyframes sunPulse{ 0%,100%{ filter:drop-shadow(0 0 22px rgba(255,223,130,.5)); } 50%{ filter:drop-shadow(0 0 36px rgba(255,223,130,.75)); } }

  .hill-back{ position:absolute; left:0; right:0; bottom:0; height:40%; background:var(--soc-strong); opacity:.55; z-index:2;
    clip-path:polygon(0 62%, 12% 44%, 30% 58%, 48% 32%, 66% 52%, 84% 36%, 100% 50%, 100% 100%, 0 100%); }
  .hill-front{ position:absolute; left:0; right:0; bottom:0; height:27%; background:var(--env-strong); z-index:3;
    clip-path:polygon(0 55%, 18% 70%, 38% 42%, 58% 62%, 78% 38%, 100% 58%, 100% 100%, 0 100%); }

  .bush-row{ position:absolute; left:0; right:0; bottom:0; display:flex; align-items:flex-end; justify-content:space-between; padding:0 2%; z-index:4; pointer-events:none; }

  .grove-tree{ position:absolute; bottom:0; z-index:4; opacity:.92; }
  .grove-tree.left{ left:1.5%; } .grove-tree.right{ right:1.5%; }

  .grove-vine{ position:absolute; z-index:4; opacity:.55; }

  .bloom-scatter{ position:absolute; bottom:2%; z-index:4; filter:drop-shadow(1px 2px 0 rgba(32,48,29,.14)); }

  .bee-fly{ position:absolute; z-index:6; }
  .bee-fly svg{ display:block; }
  .bee-buzz{ animation:beeBuzz .34s ease-in-out infinite; transform-origin:center; }
  @keyframes beeBuzz{ 0%,100%{ transform:rotate(-2deg) scaleX(1); } 50%{ transform:rotate(2deg) scaleX(.96); } }
  @keyframes flyA{ 0%{ transform:translate(0,0);} 25%{ transform:translate(40px,-26px);} 50%{ transform:translate(70px,10px);} 75%{ transform:translate(30px,34px);} 100%{ transform:translate(0,0);} }
  @keyframes flyB{ 0%{ transform:translate(0,0);} 30%{ transform:translate(-46px,22px);} 60%{ transform:translate(-20px,-30px);} 100%{ transform:translate(0,0);} }
  @keyframes flyC{ 0%{ transform:translate(0,0);} 20%{ transform:translate(24px,30px);} 55%{ transform:translate(-30px,14px);} 80%{ transform:translate(10px,-24px);} 100%{ transform:translate(0,0);} }

  /* ================= LOGIN CARD ================= */
  .login-card{ position:relative; z-index:10; width:340px; padding:30px 28px 26px;
    background:linear-gradient(135deg, var(--surface-warm), var(--surface-warm2), var(--surface-warm));
    border:1.5px solid var(--border-warm); border-radius:14px;
    box-shadow:4px 5px 0 rgba(190,138,46,.18), 0 24px 60px rgba(32,48,29,.28);
    opacity:0; transform:translateY(16px) scale(.97); animation:cardIn .5s cubic-bezier(.2,1,.3,1) .15s forwards; }
  @keyframes cardIn{ to{ opacity:1; transform:translateY(0) scale(1); } }

  .brand-row{ display:flex; align-items:center; gap:9px; margin-bottom:18px; opacity:0; animation:riseIn .35s ease-out .4s forwards; }
  @keyframes riseIn{ to{ opacity:1; transform:translateY(0); } }
  .logo-mark{ width:26px; height:26px; border-radius:7px; background:linear-gradient(135deg, var(--env), var(--soc)); flex:none; }
  .brand-row span{ font-size:16px; }

  h1{ font-size:19px; margin:0 0 4px; opacity:0; transform:translateY(8px); animation:riseIn .35s ease-out .48s forwards; }
  .sub{ font-size:12.5px; color:var(--text-muted); margin:0 0 22px; opacity:0; transform:translateY(8px); animation:riseIn .35s ease-out .54s forwards; }

  form{ display:flex; flex-direction:column; gap:14px; }
  .field{ display:flex; flex-direction:column; gap:6px; opacity:0; transform:translateY(8px); animation:riseIn .35s ease-out forwards; }
  .field:nth-of-type(1){ animation-delay:.6s; } .field:nth-of-type(2){ animation-delay:.66s; } .field:nth-of-type(3){ animation-delay:.72s; }
  label{ font-size:11.5px; font-weight:600; color:var(--text-muted); text-transform:uppercase; letter-spacing:.4px; }
  input[type="text"], input[type="password"]{
    font-family:'Inter', sans-serif; font-size:13.5px; padding:10px 12px; border-radius:8px;
    border:1.5px solid var(--border); background:var(--bg); color:var(--text); outline:none;
    transition:border-color .16s ease, box-shadow .16s ease; }
  input::placeholder{ color:var(--text-faint); }
  input:hover{ border-color:var(--border-warm); }
  input:focus{ border-color:var(--env); box-shadow:0 0 0 3px var(--gold-dim); }
  input.err{ border-color:var(--danger); }
  .pw-wrap{ position:relative; }
  .pw-wrap input{ width:100%; padding-right:38px; }
  .pw-toggle{ position:absolute; right:6px; top:50%; transform:translateY(-50%); background:none; border:none; cursor:pointer;
    font-size:15px; padding:4px; border-radius:6px; line-height:1; }
  .pw-toggle:hover{ background:var(--surface); }

  .role-seg{ display:flex; border:1.5px solid var(--border); border-radius:8px; overflow:hidden; background:var(--bg); }
  .role-opt{ flex:1; padding:8px 4px; background:transparent; border:none; cursor:pointer; font-family:'Inter';
    font-size:11.5px; font-weight:600; color:var(--text-muted); transition:background .16s ease, color .16s ease; }
  .role-opt + .role-opt{ border-left:1.5px solid var(--border); }
  .role-opt:hover{ background:var(--surface); }
  .role-opt.active{ background:var(--env); color:#fff; }

  .remember-row{ display:flex; align-items:center; justify-content:space-between; font-size:12px; color:var(--text-muted);
    opacity:0; transform:translateY(8px); animation:riseIn .35s ease-out .78s forwards; }
  .remember-row label{ display:flex; align-items:center; gap:6px; font-size:12px; font-weight:400; text-transform:none; letter-spacing:0; cursor:pointer; }
  .remember-row a{ color:var(--env-strong); font-weight:600; text-decoration:none; }
  .remember-row a:hover{ text-decoration:underline; }

  .btn-login{ margin-top:4px; padding:11px; border:none; border-radius:9px; background:var(--env); color:#fff;
    font-family:'Space Grotesk'; font-weight:600; font-size:14px; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:8px;
    box-shadow:3px 3px 0 rgba(13,83,14,.28); transition:transform .14s ease, box-shadow .14s ease, background .14s ease;
    opacity:0; transform:translateY(8px); animation:riseIn .35s ease-out .84s forwards; }
  .btn-login:hover{ background:var(--env-strong); transform:translate(-1px,-2px); box-shadow:4px 5px 0 rgba(13,83,14,.32); }
  .btn-login:active{ transform:translate(0,0) scale(.98); box-shadow:2px 2px 0 rgba(13,83,14,.3); }
  .btn-login.loading{ pointer-events:none; opacity:.85; }
  .spinner{ width:13px; height:13px; border:2px solid rgba(255,255,255,.4); border-top-color:#fff; border-radius:50%; animation:spin .6s linear infinite; display:none; }
  .btn-login.loading .spinner{ display:inline-block; }
  @keyframes spin{ to{ transform:rotate(360deg); } }

  .foot-note{ margin-top:16px; text-align:center; font-size:11.5px; color:var(--text-faint);
    opacity:0; transform:translateY(8px); animation:riseIn .35s ease-out .9s forwards; }

  .toast-stack{ position:fixed; bottom:20px; left:50%; transform:translateX(-50%); display:flex; flex-direction:column; gap:8px; z-index:100; align-items:center; }
  .toast{ background:var(--ink); color:#fff; font-size:12.5px; padding:10px 16px; border-radius:8px; opacity:0; transform:translateY(8px); transition:opacity .2s ease, transform .2s ease; box-shadow:0 6px 18px rgba(0,0,0,.2); }
  .toast.show{ opacity:1; transform:translateY(0); }
</style>
</head>
<body>

<div class="scene">
  <div class="sky"></div>
  <div class="sun-wrap"><svg class="crisp" id="sun-svg" width="126" height="126" viewBox="0 0 9 9"></svg></div>
  <div class="hill-back"></div>
  <div class="hill-front"></div>

  <svg class="grove-tree left crisp" id="tree-left" style="opacity:.8;"></svg>
  <svg class="grove-tree right crisp" id="tree-right" style="opacity:.8;"></svg>
  <svg class="grove-vine crisp" id="vine-left"></svg>
  <svg class="grove-vine crisp" id="vine-right" style="transform:scaleX(-1);"></svg>
  <svg class="bloom-scatter crisp" id="bloom-1"></svg>
  <svg class="bloom-scatter crisp" id="bloom-2"></svg>
  <svg class="bloom-scatter crisp" id="bloom-3"></svg>

  <div class="bush-row" id="bush-row"></div>

  <div class="bee-fly" id="bee-1"><div class="bee-buzz"><svg class="crisp" width="42" height="47" viewBox="0 0 17 19"></svg></div></div>
  <div class="bee-fly" id="bee-2"><div class="bee-buzz"><svg class="crisp" width="30" height="34" viewBox="0 0 17 19"></svg></div></div>
  <div class="bee-fly" id="bee-3"><div class="bee-buzz"><svg class="crisp" width="52" height="58" viewBox="0 0 17 19"></svg></div></div>
  <div class="bee-fly" id="bee-4"><div class="bee-buzz"><svg class="crisp" width="26" height="29" viewBox="0 0 17 19"></svg></div></div>
  <div class="bee-fly" id="bee-5"><div class="bee-buzz"><svg class="crisp" width="36" height="40" viewBox="0 0 17 19"></svg></div></div>

  <div class="login-card">
    <div class="brand-row"><div class="logo-mark"></div><span class="disp">EcoSphere</span></div>
    <h1 class="disp">Welcome back</h1>
    <p class="sub">Sign in to track your impact</p>
    <form id="login-form" novalidate>
      <div class="field">
        <label for="username">Username</label>
        <input type="text" id="username" placeholder="you@company.com" autocomplete="username" />
      </div>
      <div class="field">
        <label for="password">Password</label>
        <div class="pw-wrap">
          <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" />
          <button type="button" class="pw-toggle" id="pw-toggle" aria-label="Show password">👁</button>
        </div>
      </div>
      <div class="field">
        <label>Role</label>
        <div class="role-seg" id="role-seg" role="radiogroup" aria-label="Select role">
          <button type="button" class="role-opt active" data-role="Admin" role="radio" aria-checked="true">Admin</button>
          <button type="button" class="role-opt" data-role="Project Manager" role="radio" aria-checked="false">Project Manager</button>
          <button type="button" class="role-opt" data-role="Employee" role="radio" aria-checked="false">Employee</button>
        </div>
      </div>
      <div class="remember-row">
        <label><input type="checkbox" id="remember" style="margin:0;" />Remember me</label>
        <a href="#" id="forgot-link">Forgot password?</a>
      </div>
      <button type="submit" class="btn-login" id="login-btn"><span class="spinner"></span><span class="btn-label">Log in</span></button>
    </form>
    <div class="foot-note">Trouble signing in? Contact your ESG admin.</div>
  </div>
</div>

<script>
/* ---------- generic pixel-grid renderer (same engine as the dashboard) ---------- */
function renderPixels(svgId, grid, legend, cell){
  const svg = document.getElementById(svgId);
  if(!svg) return;
  let frag = '';
  grid.forEach((row, y) => { [...row].forEach((ch, x) => { if (ch !== '.') frag += `<rect x="${x}" y="${y}" width="1" height="1" fill="${legend[ch]}"/>`; }); });
  svg.innerHTML = frag;
  svg.setAttribute('viewBox', `0 0 ${grid[0].length} ${grid.length}`);
  if(cell){ svg.setAttribute('width', grid[0].length*cell); svg.setAttribute('height', grid.length*cell); }
}
function renderPixelsRaw(svg, grid, legend){
  if(!svg) return;
  let frag = '';
  grid.forEach((row, y) => { [...row].forEach((ch, x) => { if (ch !== '.') frag += `<rect x="${x}" y="${y}" width="1" height="1" fill="${legend[ch]}"/>`; }); });
  svg.innerHTML = frag;
}

function mulberry32(a){ return function(){ a|=0; a = a + 0x6D2B79F5 | 0; let t = Math.imul(a ^ a>>>15, 1 | a); t = t + Math.imul(t ^ t>>>7, 61 | t) ^ t; return ((t ^ t>>>14) >>> 0) / 4294967296; }; }

function genTree(w,h,seed){
  const rng = mulberry32(seed||7);
  const g = Array.from({length:h}, ()=> Array(w).fill('.'));
  const trunkW = Math.max(2, Math.floor(w*0.16));
  const trunkH = Math.floor(h*0.30);
  const cx = w/2;
  for(let y=h-trunkH; y<h; y++){ for(let x=Math.floor(cx-trunkW/2); x<Math.ceil(cx+trunkW/2); x++){ if(x>=0&&x<w) g[y][x]='T'; } }
  const canopyH = h - trunkH + 2;
  const cy = canopyH*0.55, rx = w*0.47, ry = canopyH*0.5;
  for(let y=0;y<canopyH;y++){ for(let x=0;x<w;x++){
    const dx=(x-cx)/rx, dy=(y-cy)/ry, d = dx*dx+dy*dy;
    if(d<=1){ let shade = d>0.72 ? 'D' : (rng()<0.14 ? 'H' : 'L'); if(rng()<0.05) shade='F'; g[y][x]=shade; }
  }}
  return g.map(r=>r.join(''));
}

function genBush(w,h,seed){
  const rng = mulberry32(seed||5);
  const g = Array.from({length:h}, ()=> Array(w).fill('.'));
  const cx=w/2, cy=h*0.62, rx=w*0.5, ry=h*0.55;
  for(let y=0;y<h;y++){ for(let x=0;x<w;x++){
    const dx=(x-cx)/rx, dy=(y-cy)/ry, d=dx*dx+dy*dy;
    if(d<=1){ g[y][x] = d>0.7 ? 'D' : (rng()<0.16 ? 'H' : 'L'); }
  }}
  return g.map(r=>r.join(''));
}

function genVine(h, w, seed){
  w = w||4;
  const rng = mulberry32(seed||3);
  const g = Array.from({length:h}, ()=> Array(w).fill('.'));
  let x = Math.floor(w/2), dir = rng()<0.5?1:-1;
  for(let y=0;y<h;y++){
    g[y][x]='S';
    if(y%2===1){ x += dir; if(x<=0||x>=w-1) dir*=-1; x = Math.max(0, Math.min(w-1,x)); }
    if(y%3===1){
      const side = dir*-1;
      const lx = Math.max(0, Math.min(w-1, x+side));
      if(g[y][lx]==='.') g[y][lx] = (y%9===1) ? 'F' : 'L';
      if(y%9===1 && y+1<h){ const lx2 = Math.max(0, Math.min(w-1, lx+side)); if(g[y+1][lx2]==='.') g[y+1][lx2]='f'; }
    }
  }
  return g.map(r=>r.join(''));
}

function genFlower(size, seed){
  const g = Array.from({length:size}, ()=> Array(size).fill('.'));
  const cx=size/2, cy=size/2, petals=5, petalR=size*0.24, dist=size*0.27;
  for(let p=0;p<petals;p++){
    const ang = (Math.PI*2/petals)*p - Math.PI/2;
    const px = cx + Math.cos(ang)*dist, py = cy + Math.sin(ang)*dist;
    for(let y=0;y<size;y++){ for(let x=0;x<size;x++){
      const dx=x-px, dy=y-py, d=Math.sqrt(dx*dx+dy*dy);
      if(d<=petalR && g[y][x]==='.'){ g[y][x] = d<petalR*0.55 ? 'p' : (d>petalR*0.88 ? 'e' : 'P'); }
    }}
  }
  const cR = size*0.15;
  for(let y=0;y<size;y++){ for(let x=0;x<size;x++){
    const dx=x-cx, dy=y-cy, d=Math.sqrt(dx*dx+dy*dy);
    if(d<=cR){ g[y][x] = d>cR*0.55 ? 'c' : 'C'; }
  }}
  return g.map(r=>r.join(''));
}

const treeLegend = {L:'#3C8A34', D:'#245F21', H:'#8FC46A', T:'#6B4423', F:'#F781AE'};
const vineLegend = {S:'#5C7A3E', L:'#3C8A34', F:'#F781AE', f:'#FBB4CE'};
const flowerLegend = {P:'#F76FA6', p:'#C6437F', e:'#FBD0E2', C:'#FFDF82', c:'#D9A430'};
const sunLegend = {S:'#FFDF82', O:'#D9A430'};
const beeLegend = { K:'#1A1A1A', Y:'#FFD34D', W:'#FFFFFF', P:'#FF9EC4', B:'#BFE3FF' };
const bee = [
"......K...K......","......K...K......",".....KYYYYYK.....","....KYYYYYYYK....",
"...KYYYYYYYYYK...","...KYWWYYYWWYK...","BBBKYWKYYYKWYKBBB","BBBKYYYYYYYYYKBBB",
"BBPKYYYYYYYYYKPBB","...KYYYYYYYYYK...","...KKKKKKKKKKK...","...KYYYYYYYYYK...",
"...KYYYYYYYYYK...","...KKKKKKKKKKK...","...KYYYYYYYYYK...","....KYYYYYYYK....",
".....KYYYYYK.....","......K...K......",".....K.....K....."
];
const sunGrid = ["S...S...S",".S..S..S.","..S.S.S..","SSS.O.SSS","...OOO...","SSS.O.SSS","..S.S.S..",".S..S..S.","S...S...S"];

/* scene decoration */
renderPixels('sun-svg', sunGrid, sunLegend, 14);
renderPixels('tree-left', genTree(20,30,17), treeLegend, 9);
renderPixels('tree-right', genTree(18,26,44), treeLegend, 9);
renderPixels('vine-left', genVine(56,4,9), vineLegend, 6);
renderPixels('vine-right', genVine(56,4,13), vineLegend, 6);
document.getElementById('vine-left').style.left = '9%';
document.getElementById('vine-left').style.top = '18%';
document.getElementById('vine-right').style.right = '9%';
document.getElementById('vine-right').style.top = '18%';
renderPixels('bloom-1', genFlower(17,21), flowerLegend, 3);
renderPixels('bloom-2', genFlower(19,32), flowerLegend, 3);
renderPixels('bloom-3', genFlower(15,47), flowerLegend, 3);
document.getElementById('bloom-1').style.left = '13%';
document.getElementById('bloom-2').style.right = '15%';
document.getElementById('bloom-2').style.bottom = '4%';
document.getElementById('bloom-3').style.left = '30%';
document.getElementById('bloom-3').style.bottom = '1%';

/* bush row across the bottom */
const bushRow = document.getElementById('bush-row');
const bushSeeds = [3,19,27,41,53,62,71,88];
bushSeeds.forEach((seed,i)=>{
  const w = 10 + (seed%5), h = 7 + (seed%4);
  const svg = document.createElementNS('http://www.w3.org/2000/svg','svg');
  svg.classList.add('crisp');
  svg.style.opacity = .85 + (i%2)*.1;
  bushRow.appendChild(svg);
  renderPixels(svg.id = 'bush-'+i, genBush(w,h,seed), treeLegend, 7);
});

/* bees: five, different sizes, positions, flight paths */
const beeConfigs = [
  {id:'bee-1', top:'22%', left:'20%', anim:'flyA 9s ease-in-out infinite'},
  {id:'bee-2', top:'14%', left:'70%', anim:'flyB 7s ease-in-out infinite .6s'},
  {id:'bee-3', top:'34%', left:'8%',  anim:'flyC 11s ease-in-out infinite 1.1s'},
  {id:'bee-4', top:'46%', left:'82%', anim:'flyA 8.4s ease-in-out infinite .3s'},
  {id:'bee-5', top:'58%', left:'46%', anim:'flyB 10s ease-in-out infinite 1.6s'},
];
beeConfigs.forEach(cfg=>{
  const wrap = document.getElementById(cfg.id);
  wrap.style.top = cfg.top; wrap.style.left = cfg.left; wrap.style.animation = cfg.anim;
  const svg = wrap.querySelector('svg');
  renderPixelsRaw(svg, bee, beeLegend);
});

/* twinkling stars in the upper dusk band */
const scene = document.querySelector('.scene');
for(let i=0;i<34;i++){
  const s = document.createElement('div'); s.className='star';
  const size = 1.5 + Math.random()*2.5;
  const bright = 0.55 + Math.random()*0.45;
  s.style.width = size+'px'; s.style.height = size+'px';
  s.style.zIndex = '1';
  s.style.left = (Math.random()*100)+'%';
  s.style.top = (Math.random()*48)+'%';
  s.style.boxShadow = `0 0 ${2+size*2}px ${size*0.8}px rgba(255,253,243,${bright*0.6})`;
  s.style.animationDelay = (Math.random()*3.2)+'s';
  s.style.animationDuration = (2.4 + Math.random()*2.2)+'s';
  scene.insertBefore(s, document.querySelector('.sun-wrap'));
}

/* ---------- role segmented control ---------- */
let selectedRole = 'Admin';
document.querySelectorAll('.role-opt').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    document.querySelectorAll('.role-opt').forEach(b=>{ b.classList.remove('active'); b.setAttribute('aria-checked','false'); });
    btn.classList.add('active'); btn.setAttribute('aria-checked','true');
    selectedRole = btn.dataset.role;
  });
});

/* ---------- password visibility toggle ---------- */
const pwInput = document.getElementById('password');
const pwToggle = document.getElementById('pw-toggle');
pwToggle.addEventListener('click', ()=>{
  const show = pwInput.type === 'password';
  pwInput.type = show ? 'text' : 'password';
  pwToggle.textContent = show ? '🙈' : '👁';
  pwToggle.setAttribute('aria-label', show ? 'Hide password' : 'Show password');
});

/* ---------- toast system ---------- */
let stack = document.querySelector('.toast-stack');
if(!stack){ stack = document.createElement('div'); stack.className='toast-stack'; stack.setAttribute('aria-live','polite'); document.body.appendChild(stack); }
function showToast(msg, ms){
  ms = ms || 2600;
  const t = document.createElement('div');
  t.className = 'toast'; t.textContent = msg; t.setAttribute('role','status');
  stack.appendChild(t);
  requestAnimationFrame(()=> t.classList.add('show'));
  setTimeout(()=>{ t.classList.remove('show'); setTimeout(()=> t.remove(), 220); }, ms);
}

/* ---------- form submit ---------- */
const form = document.getElementById('login-form');
const loginBtn = document.getElementById('login-btn');
const usernameInput = document.getElementById('username');
const card = document.querySelector('.login-card');
form.addEventListener('submit', (e)=>{
  e.preventDefault();
  let valid = true;
  [usernameInput, pwInput].forEach(inp=>{
    if(!inp.value.trim()){ inp.classList.add('err'); valid = false; } else { inp.classList.remove('err'); }
  });
  if(!valid){
    card.style.animation = 'none'; void card.offsetWidth;
    card.style.transition = 'transform .08s ease'; 
    card.style.transform = 'translateX(-6px)';
    setTimeout(()=>{ card.style.transform = 'translateX(6px)'; }, 80);
    setTimeout(()=>{ card.style.transform = 'translateX(0)'; }, 160);
    showToast('Enter your username and password to continue');
    return;
  }
  loginBtn.classList.add('loading');
  loginBtn.querySelector('.btn-label').textContent = 'Signing in…';
  setTimeout(()=>{
    loginBtn.classList.remove('loading');
    loginBtn.querySelector('.btn-label').textContent = 'Log in';
    showToast('Signed in as ' + selectedRole + ' — welcome back!');
  }, 1200);
});
document.getElementById('forgot-link').addEventListener('click', (e)=>{ e.preventDefault(); showToast('Password reset — coming soon'); });
[usernameInput, pwInput].forEach(inp=> inp.addEventListener('input', ()=> inp.classList.remove('err')));
</script>
</body>
</html>
